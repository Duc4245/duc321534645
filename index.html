<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Hoàng Công Đức</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 50px;
            margin: 0;
            line-height: 1.6;
        }

        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .highlight-red {
            color: #c00000;
            font-weight: bold;
        }

        .profile-container {
            text-align: center;
            font-size: 1.5rem;
        }

        .info-text {
            margin-bottom: 20px;
        }

        .profile-img {
            max-width: 300px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-top: 15px;
        }

        .dots {
            margin-top: 20px;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <h1>WELCOME TO <span class="highlight-red">HOÀNG CÔNG ĐỨC</span></h1>

    <div class="profile-container">
        <div class="info-text">
            <span class="highlight-red">Profile:</span> 
            MSSV: 2474802010089 - Ngày sinh: 04/12/2006
        </div>
        
        <img src="download.png" alt="Ảnh cá nhân của Hoàng Công Đức" class="profile-img">
    </div>

    <div class="dots">............</div>

</body>
</html>
